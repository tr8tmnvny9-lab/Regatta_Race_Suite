name: RegattaTracker
options:
  bundleIdPrefix: com.regatta
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.4.0
  GRDB.swift:
    url: https://github.com/groue/GRDB.swift
    from: 6.20.0
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift.git
    from: 2.0.0
targets:
  RegattaTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [RegattaTracker]
    dependencies:
      - package: Supabase
      - package: GRDB.swift
        product: GRDB
      - package: LiveKit
        product: LiveKit
      - sdk: CoreLocation.framework
      - sdk: CoreMotion.framework
      - sdk: AVFoundation.framework
      - sdk: AuthenticationServices.framework
      - sdk: CryptoKit.framework
      - sdk: CoreHaptics.framework
      - sdk: Network.framework
    settings:
      CODE_SIGN_IDENTITY: "-"
      DEVELOPMENT_TEAM: ""
    info:
      path: RegattaTracker/Info.plist
      properties:
        NSLocationAlwaysAndWhenInUseUsageDescription: "RegattaTracker uses your location to provide high-frequency telemetry to the race committee."
        NSLocationWhenInUseUsageDescription: "RegattaTracker uses your location to provide high-frequency telemetry."
        NSBluetoothAlwaysUsageDescription: "RegattaTracker uses Bluetooth to connect to UWB hardware nodes."
        NSCameraUsageDescription: "RegattaTracker uses the camera for live streaming race footage."
        NSMicrophoneUsageDescription: "RegattaTracker uses the microphone for live streaming race audio."
        NSMotionUsageDescription: "RegattaTracker uses motion data for raw gyro and accelerometer telemetry."
        UIBackgroundModes: [location, bluetooth-central, audio, voip]
        UILaunchScreen: {}
